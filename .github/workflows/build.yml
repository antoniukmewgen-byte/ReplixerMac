name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14        # arm64 (Apple Silicon runner)
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # Кешуємо SPM залежності — TDLib великий, без кешу щоразу 15+ хв
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
            ~/.cache/org.swift.swiftpm
          key: spm-${{ hashFiles('Package.swift') }}
          restore-keys: spm-

      - name: Build (Release, arm64 only)
        run: |
          swift build -c release

      - name: Make .app bundle
        run: |
          BIN=$(swift build -c release --show-bin-path)
          mkdir -p .build/Replixer.app/Contents/MacOS
          mkdir -p .build/Replixer.app/Contents/Resources
          cp "$BIN/ReplixerMac" .build/Replixer.app/Contents/MacOS/Replixer
          chmod +x .build/Replixer.app/Contents/MacOS/Replixer
          cp Info.plist .build/Replixer.app/Contents/Info.plist
          codesign --sign "-" --force --deep --timestamp=none \
            --entitlements ReplixerMac.entitlements \
            .build/Replixer.app

      - name: Create DMG
        run: |
          mkdir -p .build/dmg_staging
          cp -r .build/Replixer.app .build/dmg_staging/
          ln -s /Applications .build/dmg_staging/Applications
          hdiutil create \
            -volname "Replixer 1.0.0" \
            -srcfolder .build/dmg_staging \
            -ov -format UDZO -fs HFS+ \
            Replixer-1.0.0.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Replixer-DMG
          path: Replixer-1.0.0.dmg
          retention-days: 30
