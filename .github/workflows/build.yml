name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14        # arm64 runner; cross-compiles to x86_64 below
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
            ~/.cache/org.swift.swiftpm
          key: spm-x86-${{ hashFiles('Package.swift') }}
          restore-keys: spm-x86-

      - name: Build (Release, x86_64)
        run: |
          swift build -c release --arch x86_64 -j 2 2>&1 | tee build_log.txt
          if grep -q "error:" build_log.txt; then
            echo "=== SWIFT ERRORS ==="
            grep "error:" build_log.txt
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Make .app bundle
        run: |
          BIN=$(swift build -c release --arch x86_64 --show-bin-path)
          mkdir -p .build/Replixer.app/Contents/MacOS
          mkdir -p .build/Replixer.app/Contents/Resources
          cp "$BIN/ReplixerMac" .build/Replixer.app/Contents/MacOS/Replixer
          chmod +x .build/Replixer.app/Contents/MacOS/Replixer
          cp Info.plist .build/Replixer.app/Contents/Info.plist
          codesign --sign "-" --force --deep --timestamp=none \
            --entitlements ReplixerMac.entitlements \
            .build/Replixer.app

      - name: Create DMG
        run: |
          mkdir -p .build/dmg_staging
          cp -r .build/Replixer.app .build/dmg_staging/
          ln -s /Applications .build/dmg_staging/Applications
          hdiutil create \
            -volname "Replixer 1.0.0" \
            -srcfolder .build/dmg_staging \
            -ov -format UDZO -fs HFS+ \
            Replixer-1.0.0.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Replixer-DMG
          path: Replixer-1.0.0.dmg
          retention-days: 30
